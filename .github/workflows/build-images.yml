name: Build and Publish Images

on:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - client
          - server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare repository owner
        id: repo-owner
        run: |
          echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo-owner.outputs.owner_lc }}/firefly-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine build context and Dockerfile
        id: build-config
        run: |
          echo "context=code/${{ matrix.image }}" >> $GITHUB_OUTPUT
          echo "dockerfile=code/${{ matrix.image }}/Dockerfile" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.build-config.outputs.context }}
          file: ${{ steps.build-config.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64


  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION#v}"

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🎉 FireFly Release ${{ steps.version.outputs.version }}
            
            ### 📦 Docker Images
            - `ghcr.io/${{ github.repository_owner }}/firefly-client:${{ steps.version.outputs.version }}`
            - `ghcr.io/${{ github.repository_owner }}/firefly-server:${{ steps.version.outputs.version }}`
            
            ### 🚀 Deployment
            Update your deployment to use the new image versions.
            
            For more information, see the [documentation](https://github.com/${{ github.repository }}/tree/main/docs).
          draft: false
          prerelease: false
