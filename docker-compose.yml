services:
  nginx:
    image: nginx:alpine
    container_name: firefly-nginx
    ports:
      - "${PROXY_HTTP_PORT:-9080}:${PROXY_HTTP_PORT:-9080}"
      - "${PROXY_HTTPS_PORT:-9443}:${PROXY_HTTPS_PORT:-9443}"
      - "${PROXY_OIDC_HTTPS_PORT:-4443}:${PROXY_OIDC_HTTPS_PORT:-4443}"
    environment:
      HTTP_PORT: ${PROXY_HTTP_PORT:-9080}
      HTTPS_PORT: ${PROXY_HTTPS_PORT:-9443}
      CLIENT_HOST: client
      CLIENT_PORT: 8080
      API_HOST: server
      API_PORT: 8080
      OIDC_HOST: oidc
      OIDC_PORT: 8080
      OIDC_HTTPS_PORT: ${PROXY_OIDC_HTTPS_PORT:-4443}
      SOURCE_PORT: ${PROXY_HTTPS_PORT:-9443}
    volumes:
      - ./config/nginx/templates/dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./config/nginx/snippets:/etc/nginx/snippets:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
      oidc:
        condition: service_started
    networks:
      - firefly

  postgres:
    image: postgres:16-alpine
    container_name: firefly-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly_dev}
      POSTGRES_DB: ${POSTGRES_DB:-firefly}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firefly} -d ${POSTGRES_DB:-firefly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - firefly
      - judge0-sandbox

  redis:
    image: redis:7-alpine
    container_name: firefly-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - firefly
      - judge0-sandbox

  judge0:
    image: judge0/judge0:1.13.1
    container_name: firefly-judge0
    privileged: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50M
        max-file: "2"
    tmpfs:
      - /box:exec,size=512M
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: ${POSTGRES_USER:-firefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      # Security: disable network access for sandboxed code
      ENABLE_NETWORK: "false"
      ALLOW_ENABLE_NETWORK: "false"
      # Security: restrict compiler options and command line args
      ENABLE_COMPILER_OPTIONS: "false"
      ENABLE_COMMAND_LINE_ARGUMENTS: "false"
      ENABLE_ADDITIONAL_FILES: "false"
      # cgroup v2 compatibility: use per-process/thread limits instead of cgroup v1
      ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT: "true"
      ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - firefly
      - judge0-sandbox

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: firefly-judge0-workers
    command: ./scripts/workers
    privileged: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50M
        max-file: "2"
    tmpfs:
      - /box:exec,size=512M
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: ${POSTGRES_USER:-firefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      # Security: disable network access for sandboxed code
      ENABLE_NETWORK: "false"
      ALLOW_ENABLE_NETWORK: "false"
      # Security: restrict compiler options and command line args
      ENABLE_COMPILER_OPTIONS: "false"
      ENABLE_COMMAND_LINE_ARGUMENTS: "false"
      ENABLE_ADDITIONAL_FILES: "false"
      # cgroup v2 compatibility: use per-process/thread limits instead of cgroup v1
      ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT: "true"
      ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT: "true"
    depends_on:
      - judge0
    networks:
      - judge0-sandbox

  oidc:
    image: ghcr.io/plainscope/simple-oidc-provider
    container_name: firefly-oidc
    environment:
      CLIENT_ID: ${OIDC_CLIENT_ID:-firefly}
      CLIENT_NAME: ${OIDC_CLIENT_NAME:-FireFly}
      CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-firefly-secret}
      COOKIES_SECURE: "false"
      COOKIES_SAMESITE: Lax
      COOKIES_KEYS: '["59761AB67FB5BA23BDD917B2F2E409394A848F50FA9CEB08860C73495339266E"]'
      DIRECTORY_USERS_FILE: /app/config/users.json
      ISSUER: https://${PUBLIC_HOST:-localhost}:${PROXY_OIDC_HTTPS_PORT:-4443}
      NODE_ENV: development
      PORT: 8080
      PROXY: true
      POST_LOGOUT_REDIRECT_URIS: >-
        https://${PUBLIC_HOST:-localhost}:${PROXY_HTTPS_PORT:-9443}/api/v1/auth/callback,
        http://localhost:8080/api/v1/auth/callback,
        http://10.0.2.2:8080/api/v1/auth/callback
      REDIRECT_URIS: >-
        https://${PUBLIC_HOST:-localhost}:${PROXY_HTTPS_PORT:-9443}/api/v1/auth/callback,
        http://localhost:8080/api/v1/auth/callback,
        http://10.0.2.2:8080/api/v1/auth/callback
    volumes:
      - ./config/oidc/users.json:/app/config/users.json:ro
    networks:
      - firefly

  server:
    build:
      context: ./code/server
      dockerfile: Dockerfile
    container_name: firefly-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_USER:-firefly}:${POSTGRES_PASSWORD:-firefly_dev}@postgres:5432/${POSTGRES_DB:-firefly}
      REDIS_URL: redis://redis:6379
      JUDGE0_URL: http://judge0:2358
      OIDC_ISSUER: http://oidc:8080
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-firefly}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-firefly-secret}
      OIDC_REDIRECT_URI: https://${PUBLIC_HOST:-localhost}:${PROXY_HTTPS_PORT:-9443}/api/v1/auth/callback
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      CLIENT_ORIGIN: https://${PUBLIC_HOST:-localhost}:${PROXY_HTTPS_PORT:-9443}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      oidc:
        condition: service_started
    networks:
      - firefly

  client:
    build:
      context: ./code/client
      dockerfile: Dockerfile
    container_name: firefly-client
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      NODE_ENV: ${NODE_ENVIRONMENT:-development}
      PORT: 8080
    depends_on:
      - server
    networks:
      - firefly

volumes:
  pgdata:

networks:
  firefly:
    driver: bridge
  judge0-sandbox:
    driver: bridge
    internal: true
